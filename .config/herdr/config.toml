# ~/.config/herdr/config.toml (symlinked from dotfiles/.config/herdr/config.toml)
# herdr 0.7.1 / upstream

onboarding = false

[theme]
name = "catppuccin"
auto_switch = true
dark_name = "catppuccin"
light_name = "catppuccin-latte"

[terminal]
default_shell = ""
shell_mode = "auto"
new_cwd = "follow"

[worktrees]
directory = "~/.herdr/worktrees"

[session]
resume_agents_on_restore = true

[keys]
prefix = "ctrl+b"
split_horizontal = "prefix+minus"
split_vertical = "prefix+v"
open_notification_target = "prefix+o"
reload_config = "prefix+shift+r"
# Agent 上下移動とタブリネームを楽に (Meijin_garden tip)
rename_tab = "prefix+comma"
previous_agent = "prefix+ctrl+n"
next_agent = "prefix+ctrl+p"
# worktree 操作
# 標準ダイアログ (HEAD 起点) は prefix+alt+g に退避。
# prefix+shift+g は下の [[keys.command]] で「最新 origin/main 起点で作成」に割り当て。
new_worktree = "prefix+alt+g"          # UI ダイアログで新規作成 (格納先: [worktrees] directory)
open_worktree = "prefix+shift+o"

# floating popup で nvim を開いてファイル閲覧 (カレントディレクトリを開く)
[[keys.command]]
key = "prefix+shift+e"
type = "popup"
command = "nvim ."
description = "open nvim popup in current dir"
width = "90%"
height = "90%"

# 最新 origin/main (default branch) を fetch してから worktree を作成
[[keys.command]]
key = "prefix+shift+g"
type = "pane"
command = "sh ~/.config/herdr/new-worktree-from-main.sh"
description = "new worktree from latest main"

# PR 番号を対話入力して PR head branch の worktree を作成 (PR review 用)
# default の rename_pane を shadow するが rename_pane は普段使わない想定。
[[keys.command]]
key = "prefix+shift+p"
type = "pane"
command = "sh ~/.config/herdr/pr-review-worktree.sh"
description = "new worktree from PR"
[ui]
agent_panel_sort = "priority"
accent = "cyan"
show_agent_labels_on_pane_borders = true
pane_borders = true
pane_gaps = true
# タブをサクサク切りたい (Meijin_garden tip)
prompt_new_tab_name = false
# 誤閉じ防止 (miyagawa 参考)
confirm_close = true

[ui.sound]
enabled = true

[experimental]
switch_ascii_input_source_in_prefix = true
reveal_hidden_cursor_for_cjk_ime = true
cjk_ime_agents = ["claude", "codex"]
cjk_ime_cursor_shape = "steady_block"
